{% extends "blog/base.html" %}

{% block content %}
    {% if form.errors %}
        <p style="color: red;">Your username and/or password didn't match. Please try again.</p>
    {% endif %}

    <h2>Log in</h2>

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}

        <table>
            <tr>
                <td>{{ form.username.label_tag }}</td>
                <td>{{ form.username }}</td>
            </tr>
            <tr>
                <td>{{ form.password.label_tag }}</td>
                <td>{{ form.password }}</td>
            </tr>
        </table>

        <input type="submit" value="Log in" />
        <input type="hidden" name="next" value="{{ next }}" />
    </form>
{% endblock %}
